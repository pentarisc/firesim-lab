# =============================================================================
#  docker-compose-dev.yaml — firesim-lab simulation environment yaml file for
#                            local development before pushing docker changes to github
#
#  /opt/firesim-lab folder by binding local volume to facilitate local development. 
#
#  To launch: cd ~/pentarisc/projects/firesim-lab/docker && \
#             docker compose -f docker-compose-dev.yaml up -d
#
#  To get a shell: docker exec -it firesim-lab-dev bash
#
#
#  Tier layout (all three tiers present at runtime):
#    /opt/firesim          — baked into image, root-owned, world-readable (Tier 1)
#    /opt/firesim-lab      — baked into image, root-owned, world-readable (Tier 2)
#    /target               — bind-mounted from host (your project, Tier 3)
#
#  Generic image design
#  ────────────────────
#  The image is pulled from Docker Hub (or built once locally) and shared by
#  all users.  HOST_UID / HOST_GID are runtime environment variables written
#  by run.sh into .firesim-lab.env.  The container entrypoint (running as
#  root) uses them to:
#    • Create transient /etc/passwd + /etc/group entries for the host user.
#    • Add the host user to the firesim-lab-cache group (GID CACHE_GID).
#    • Drop privileges via gosu before executing the user's command.
#  No `user:` override is set here — the entrypoint handles privilege
#  dropping, which allows it to perform the group setup steps first.
#
#  HOME is explicitly set to /home/firesim-lab (the fixed cache home baked
#  into the image) so SBT, ccache, pip, and other tools resolve ~ correctly
#  regardless of which UID is running.  The entrypoint also writes this path
#  into the /etc/passwd entry for the host user so getpwuid() agrees.
#
#  Named volumes
#  ─────────────
#    sbt-ivy-cache     — /home/firesim-lab/.ivy2
#    sbt-coursier      — /home/firesim-lab/.cache/coursier
#    sbt-boot          — /home/firesim-lab/.sbt/boot
#    sbt-global        — /home/firesim-lab/.sbt/1.0
#    verilator-ccache  — /home/firesim-lab/.cache/ccache
#
#  All cache directories are 2775 (setgid + group-writable) and owned by
#  firesim-lab-cache (GID 2543 by default).  The setgid bit ensures that
#  files created at runtime by the host user inherit GID 2543, keeping them
#  writable by future container runs — with no per-start chown required.
#
#  Required .env variables (written by run.sh into .firesim-lab.env):
#    HOST_WORKSPACE_DIR  — absolute host path to the user's target project
#    HOST_UID            — host user's numeric UID
#    HOST_GID            — host user's numeric primary GID
#    FIRESIM_IMAGE       — image name:tag  (e.g. pentarisc/firesim-lab:latest)
#    CONTAINER_NAME      — name for the running container
# =============================================================================

services:
  firesim-lab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FIRESIM_COMMIT:     ${FIRESIM_COMMIT:-main}
        FIRESIM_LAB_COMMIT: ${FIRESIM_LAB_COMMIT:-main}
        SBT_VERSION:        ${SBT_VERSION:-1.10.1}
        JAVA_VERSION:       ${JAVA_VERSION:-17}
        # CACHE_GID controls the group that owns all cache directories.
        # Only override this when rebuilding locally AND the default GID (2543)
        # conflicts with an existing group on your host.  Must match the value
        # baked into the image if pulling from Docker Hub.
        CACHE_GID:          ${CACHE_GID:-2543}

    image: ${FIRESIM_IMAGE:-pentarisc/firesim-lab:latest}
    container_name: ${CONTAINER_NAME:-firesim-lab-dev}

    # No `user:` override — the entrypoint detects the host user's UID/GID
    # from the ownership of /target (the workspace bind mount) and calls gosu
    # to drop privileges after setting up /etc/passwd and /etc/group entries.
    # The entrypoint must start as root to modify these files.

    # Keep stdin open so `docker exec` and interactive sessions work.
    stdin_open: true
    tty: true
    command: /bin/bash

    # ── Environment variables visible inside the container ──────────────────
    environment:
      # ── Cache group ID ────────────────────────────────────────────────────
      # HOST_UID and HOST_GID are intentionally absent — the entrypoint and
      # firesim-lab-shell detect them from /target ownership, which is always
      # correct and requires no environment variable plumbing through compose.
      CACHE_GID: ${CACHE_GID:-2543}

      # ── Fixed HOME — critical for cache path resolution ───────────────────
      # SBT resolves ~/.ivy2, ~/.sbt, etc. from HOME; ccache resolves
      # CCACHE_DIR; pip resolves its cache from HOME.  Keeping HOME fixed
      # to the pre-warmed cache location means these tools work correctly
      # for any host UID without re-fetching dependencies.
      HOME: /home/firesim-lab

      # ── Tier paths ────────────────────────────────────────────────────────
      FIRESIM_ROOT:     /opt/firesim
      FIRESIM_LAB_ROOT: /opt/firesim-lab
      TARGET_ROOT:      /target

      # ── SBT ───────────────────────────────────────────────────────────────
      # Memory limits + disable interactive supershell (breaks non-TTY CI).
      SBT_OPTS: "-Xmx8g -Xss8m -Dsbt.supershell=false -Dsbt.server.type=none"

      # ── Verilator ─────────────────────────────────────────────────────────
      # Set to the number of physical cores on the host for best performance.
      VERILATOR_THREADS: ${VERILATOR_THREADS:-4}

      # ── Plugin system ─────────────────────────────────────────────────────
      ENABLE_CUSTOM_PLUGINS: ${ENABLE_CUSTOM_PLUGINS:-0}

    # ── Volume mounts ───────────────────────────────────────────────────────
    volumes:

      # ── Tier 3: override /opt/firesim-lab with your own for developmet purposes ──────
      # (change ~/pentarisc/projects/firesim-lab to wherever you have cloned firesim-lab)
      - type: bind
        source: ${HOME}/pentarisc/projects/firesim-lab
        target: /opt/firesim-lab

      # ── Tier 3: user target project (bind mount) ──────────────────────────
      # Read-write so generated-src/ and build artifacts persist on the host.
      - type: bind
        source: ${HOST_WORKSPACE_DIR:-${HOME}/pentarisc/projects/firesim-lab/examples}
        target: /target

      # ── SBT / Ivy artifact cache ──────────────────────────────────────────
      # Pre-warmed during image build; persisted across container restarts.
      # Group-writable (2775 + setgid GID 2543) — no chown on container start.
      - type: volume
        source: sbt-ivy-cache
        target: /home/firesim-lab/.ivy2

      # ── Coursier resolver cache ───────────────────────────────────────────
      - type: volume
        source: sbt-coursier
        target: /home/firesim-lab/.cache/coursier

      # ── SBT boot directory ────────────────────────────────────────────────
      # Stores the SBT launcher and Scala compiler distributions.
      - type: volume
        source: sbt-boot
        target: /home/firesim-lab/.sbt/boot

      # ── SBT global plugins and settings ──────────────────────────────────
      - type: volume
        source: sbt-global
        target: /home/firesim-lab/.sbt/1.0

      # ── Verilator build cache (ccache) ────────────────────────────────────
      # Eliminates redundant g++ recompilation of Verilator-generated C++.
      - type: volume
        source: verilator-ccache
        target: /home/firesim-lab/.cache/ccache

    # ── Resource limits ─────────────────────────────────────────────────────
    # Chisel elaboration + Verilator compilation are memory-intensive.
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-16g}
        reservations:
          memory: ${CONTAINER_MEMORY_RESERVE:-8g}

    # ── Working directory ────────────────────────────────────────────────────
    working_dir: /target

# =============================================================================
#  Named volumes
#  Managed by Docker under /var/lib/docker/volumes/.
#  Persist until explicitly removed with `docker volume rm` or
#  `firesim-lab --clean-cache`.
#  Seeded on first use from the corresponding image layer path.
#
#  Volume names are user-specific (embed HOST_UID) so that multiple users
#  on the same Docker host have independent caches.  The names are
#  pre-composed by the run script and written into .firesim-lab.env as
#  VOLUME_* variables, which are substituted here by docker-compose's
#  --env-file mechanism.  Because the values are plain strings (not
#  expressions involving HOST_UID), substitution is reliable.
#
#  Note: after a major SBT version upgrade, stale boot/global volumes may
#  cause version conflicts.  Run `firesim-lab --clean-cache` to wipe and
#  re-seed from the new image layer.
# =============================================================================
volumes:
  sbt-ivy-cache:
    name: ${VOLUME_SBT_IVY}
  sbt-coursier:
    name: ${VOLUME_SBT_COURSIER}
  sbt-boot:
    name: ${VOLUME_SBT_BOOT}
  sbt-global:
    name: ${VOLUME_SBT_GLOBAL}
  verilator-ccache:
    name: ${VOLUME_CCACHE}