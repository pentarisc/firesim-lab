    board_dir: "${PLATFORMS_ROOT}/xilinx_vcu118"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # rhsresearch_nitefury_ii — bitbuilder NOT YET WIRED.
  # ----------------------------------------------------------------------------
  - id: rhsresearch_nitefury_ii
    label: "RHS Research Nitefury II"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    board_dir: "${PLATFORMS_ROOT}/rhsresearch_nitefury_ii"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # vitis  —  Xilinx Vitis / XRT (experimental). Bitbuilder NOT YET WIRED.
  # Driver-side cmake retained per the previous registry.
  # ----------------------------------------------------------------------------
  - id: vitis
    label: "Vitis"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars:
      - XILINX_XRT
    extra_cxx_flags: []
    extra_include_dirs:
      - "$ENV{XILINX_XRT}/include"
      - "/usr/include"
    extra_link_dirs:
      - "/usr/lib/x86_64-linux-gnu"
      - "$ENV{XILINX_XRT}/lib"
    extra_libs:
      - uuid
      - xrt_coreutil
      - dl
      - z
    extra_link_options:
      - "-Wl,-rpath-link,/usr/lib/x86_64-linux-gnu"
    board_dir: "${PLATFORMS_ROOT}/vitis"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

