# =============================================================================
#  firesim-lab/lib/registry.yaml
#
#  Central registry of available bridges, platforms, bitbuilders, features,
#  and simulator tools. Init-target reads this to discover options, validate
#  CLI input, and drive code generation.
#
#  To add a new bridge, platform, bitbuilder, or simulator: append a block
#  following the same schema.
# =============================================================================

# fslab_version: the registry schema version this file is authored for. fslab
# refuses to load a registry whose MAJOR.MINOR differs from the installed CLI.
# Bump this together with the fslab version whenever the registry schema changes.
fslab_version: "0.8.0"

bridges:

  - id: uart
    label: UART Bridge
    description: >
      Connects the target's UART TX/RX pins to the host via a token channel.
      Host driver writes received bytes to a file or stdout.
    origin: fslab
    input_ports:
      - "rxd"
    output_ports:
      - "txd"
    cpp_type: "uart_t"
    cpp_headers: ["bridges/uart.h"]
    cpp_sources: ["bridges/uart.cc"]
    runtime_plusargs:
#      - flag: "+uart-loopback"
#        description: "Echo TX bytes back to RX"
    required_params: [freq_mhz, baud_rate]
    cpp_template: "bridges/uart/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/uart/dut_imports.scala.j2"
      top_imports: "bridges/uart/top_imports.scala.j2"
      ports:       "bridges/uart/ports.scala.j2"
      wiring:      "bridges/uart/wiring.scala.j2"

  - id: fased
    label: FASED Memory Timing Model
    description: >
      Attaches a target AXI4 port to the FASED DRAM timing model.
      The C++ driver is built into firesim-lib automatically; this entry
      adds makefrag documentation and the GoldenGate symlink hook only.
    origin: firesim
    input_ports:
      # AXI4 write address (aw)
      - "s_aw_ready"
      # AXI4 write data (w)
      - "s_w_ready"
      # AXI4 write response (b)
      - "s_b_valid"
      - "s_b_id"
      - "s_b_resp"
      - "s_b_user"
      # AXI4 read address (ar)
      - "s_ar_ready"
      # AXI4 read data (r)
      - "s_r_valid"
      - "s_r_id"
      - "s_r_data"
      - "s_r_resp"
      - "s_r_last"
      - "s_r_user"
    output_ports:
      # AXI4 write address (aw)
      - "m_aw_valid"
      - "m_aw_id"
      - "m_aw_addr"
      - "m_aw_len"
      - "m_aw_size"
      - "m_aw_burst"
      - "m_aw_lock"
      - "m_aw_cache"
      - "m_aw_prot"
      - "m_aw_qos"
      - "m_aw_user"
      - "m_aw_region"
      # AXI4 write data (w)
      - "m_w_valid"
      - "m_w_data"
      - "m_w_strb"
      - "m_w_last"
      - "m_w_user"
      # AXI4 write response (b)
      - "m_b_ready"
      # AXI4 read address (ar)
      - "m_ar_valid"
      - "m_ar_id"
      - "m_ar_addr"
      - "m_ar_len"
      - "m_ar_size"
      - "m_ar_burst"
      - "m_ar_lock"
      - "m_ar_cache"
      - "m_ar_prot"
      - "m_ar_qos"
      - "m_ar_user"
      - "m_ar_region"
      # AXI4 read data (r)
      - "m_r_ready"
    cpp_type: "FASEDMemoryTimingModel"
    cpp_headers: ["bridges/fased_memory_timing_model.h"]
    cpp_sources: ["bridges/fased_memory_timing_model.cc"]
    runtime_plusargs:
      - flag: "+mm-unified-latency=<cycles>"
        description: "Simple unified read/write latency model"
      - flag: "+dramsim"
        description: "Enable DRAMSim2 timing model"
      - flag: "+fased-init-depth=<n>"
        description: "Initial DRAM row-buffer fill depth"
    required_params:
      - addr_bits
      - data_bits
      - id_bits
      - user_bits
      - memory_region_name
      - mem_base
      - mem_size
    cpp_template: "bridges/uart/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/fased/dut_imports.scala.j2"
      top_imports: "bridges/fased/top_imports.scala.j2"
      ports:       "bridges/fased/ports.scala.j2"
      wiring:      "bridges/fased/wiring.scala.j2"

  - id: iceblk
    label: BlockDevice Bridge
    description: >
      BlockDevBridge — Provides access to a virtual disk served from the host.
    origin: fslab
    input_ports:
      # Request Channel
      - "bdev_req_ready"
      # Write Data Channel
      - "bdev_data_ready"
      # Response Channel
      - "bdev_resp_valid"
      - "bdev_resp_bits_data"
      - "bdev_resp_bits_tag"
      # Info Channel
      - "bdev_info_nsectors"
      - "bdev_info_max_req_len"
    output_ports:
      # Request Channel
      - "bdev_req_valid"
      - "bdev_req_bits_write"
      - "bdev_req_bits_offset"
      - "bdev_req_bits_len"
      - "bdev_req_bits_tag"
      # Write Data Channel
      - "bdev_data_valid"
      - "bdev_data_bits_data"
      - "bdev_data_bits_tag"
      # Response Channel
      - "bdev_resp_ready"

    cpp_type: "blockdev_t"
    cpp_headers: ["bridges/blockdev.h"]
    cpp_sources: ["bridges/blockdev.cc"]
    runtime_plusargs:
    required_params: [tag_bits, n_trackers]
    cpp_template: "bridges/iceblk/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/uart/dut_imports.scala.j2"
      top_imports: "bridges/iceblk/top_imports.scala.j2"
      ports:       "bridges/iceblk/ports.scala.j2"
      wiring:      "bridges/iceblk/wiring.scala.j2"

# ---------------------------------------------------------------------------
# Features — non-bridge build-time scaffolding options
# ---------------------------------------------------------------------------
features:

  - id: verilog-blackbox
    label: Verilog BlackBox DUT
    description: >
      Generate a Chisel BlackBox wrapper and a stub Verilog module sized to
      match the selected bridges (AXI4 for FASED, UART pins, etc.)
    requires_bridge: []

  - id: multi-clock
    label: Multi-clock target
    description: >
      Adds a RationalClockBridge and generates a multi-clock TargetTop
      scaffold exposing separate clock domains to the DUT.
    requires_bridge: []

  - id: printf-synthesis
    label: Printf synthesis
    description: >
      Enables GoldenGate printf synthesis pass so target Chisel printf()
      calls are bridged to the host at simulation time.
    requires_bridge: []

# ==============================================================================
#  bitbuilders section  (catalog of build-recipe classes)
# ==============================================================================
#  A bitbuilder describes one silicon-specific *recipe* for turning staged RTL
#  into a bitstream. Multiple platforms (e.g. xilinx_alveo_u200/u250/u280) can
#  reference the same bitbuilder and supply per-platform parameters via
#  `platforms[].bitbuilder_params`.
#
#  Schema reference
#  ----------------
#    id                     str       Bitbuilder id, referenced by platforms[].bitbuilder.
#    label                  str       Human-readable label.
#    description            str       One-paragraph summary.
#    python_class           str       Class name in fslab.bitstream.bitbuilder. The
#                                     factory resolves this string to a concrete class.
#    args_schema            str       Pydantic class name validating the user's
#                                     `target.build.bitbuilder_args` block. Resolved at
#                                     parse-time by the bitbuilder-args registry.
#    params_schema          str       Pydantic class name validating the registry's
#                                     `platforms[].bitbuilder_params` block.
#    build_script_basename  str       The build script the bitbuilder uploads + runs on
#                                     the build host. Found locally at the platform's
#                                     `local_build_script`.
#    build_script_flags     list[str] Long-form flags passed to build_script_basename.
#                                     Validated for set-equality, not order.
#    template_cl_name       str       Name of the in-tree HDK template directory copied
#                                     once per build (e.g. `cl_firesim`). Empty for
#                                     bitbuilders that do not stage from a template.
#    remote_cl_parent_subdir str      Subpath under the remote platform_path where the
#                                     per-build cl_<quintuplet> directory lives.
#    artifact_glob          str       Glob (relative to `local_results_subdir/cl_<q>/`)
#                                     matching the file(s) the publisher consumes.
# ==============================================================================

bitbuilders:

  # ----------------------------------------------------------------------------
  # f2 — AWS F2 (FireSim native) bitstream recipe
  # ----------------------------------------------------------------------------
  - id: f2
    label: "AWS F2 BitBuilder"
    description: >
      Builds an AWS F2 DCP tarball using aws-fpga-firesim-f2. Mirrors firesim's
      F2BitBuilder build-side recipe (rsync HDK + project staging, run
      build-bitstream.sh, reverse-rsync results). AGFI publication is handled
      separately by the `aws_afi` publisher — see publish/.
    python_class: "F2BitBuilder"
    args_schema:   "F2BitbuilderArgs"
    params_schema: "F2BitbuilderParams"

    build_script_basename: "build-bitstream.sh"
    build_script_flags:    ["--cl_dir", "--frequency", "--strategy"]
    template_cl_name:      "cl_firesim"
    remote_cl_parent_subdir: "hdk/cl/developer_designs"
    artifact_glob:         "build/checkpoints/*.tar"

  # ----------------------------------------------------------------------------
  # TEMPLATE — copy when registering a new bitbuilder.
  # ----------------------------------------------------------------------------
  # - id: <bitbuilder_id>
  #   label: "<Human Readable>"
  #   description: "<one paragraph>"
  #   python_class: "<ClassName>"
  #   args_schema:  "<ClassNameArgs>"
  #   params_schema: "<ClassNameParams>"
  #   build_script_basename: "build-bitstream.sh"
  #   build_script_flags: ["--cl_dir", "--frequency", "--strategy"]
  #   template_cl_name: ""
  #   remote_cl_parent_subdir: ""
  #   artifact_glob: ""

# ==============================================================================
#  runners section  (catalog of FPGA-run recipe classes)
# ==============================================================================
#  A runner describes one silicon-specific *recipe* for executing a built
#  bitstream on an FPGA host. Parallel to bitbuilders. Multiple platforms can
#  reference the same runner.
#
#  Fields
#  ------
#    id                Unique id; matches `platforms[].runner` references.
#    label/description Human-facing strings.
#    python_class      Class name in fslab.runtime.runner (Phase 3+).
#    args_schema       Pydantic class validating `target.run.runner_args`
#                      (resolved via RUNNER_ARGS_REGISTRY).
#    params_schema     Pydantic class validating per-recipe params
#                      (resolved via RUNNER_PARAMS_REGISTRY). Reserved
#                      for future runner variants; today's classes are empty.
#    remote_slot_parent_subdir
#                      Subpath under the platform's remote_platform_path
#                      where the per-slot run dir lives. Empty means root.
#
#  Note: the driver binary filename is NOT specified here. It is derived
#  per-project as `<host.driver_name>-<platform_id>` (e.g. `MyDriver-f2`)
#  to match the build pipeline's CMake output naming.
# ==============================================================================

runners:

  # ----------------------------------------------------------------------------
  # f2 — AWS F2 (FireSim native) FPGA-run recipe
  # ----------------------------------------------------------------------------
  - id: f2
    label: "AWS F2 Runner"
    description: >
      Executes a built F2 bitstream on an AWS F2 host: clear FPGA slot,
      load AGFI via `fpga-load-local-image`, exec the driver, collect
      uartlog + driver.log + optional tracerv/autocounter artifacts.
    python_class: "F2Runner"
    args_schema:   "F2RunnerArgs"
    params_schema: "F2RunnerParams"

    remote_slot_parent_subdir: "sim_slot_0"

  # ----------------------------------------------------------------------------
  # TEMPLATE — copy when registering a new runner.
  # ----------------------------------------------------------------------------
  # - id: <runner_id>
  #   label: "<Human Readable>"
  #   description: "<one paragraph>"
  #   python_class: "<ClassName>"
  #   args_schema:  "<ClassNameArgs>"
  #   params_schema: "<ClassNameParams>"
  #   remote_slot_parent_subdir: ""

# ==============================================================================
# platforms section
# ==============================================================================
# Schema reference
# ----------------------------
# Each entry under `platforms:` is keyed by the platform ID (matches the value
# a user selects with `fslab new --platform <id>`).
#
# Driver-side cmake fields
# ---------------------------------------------------------
#   rpath_origin, required_env_vars, extra_cxx_flags, extra_include_dirs,
#   extra_link_dirs, extra_libs, extra_link_options, board_dir,
#   fpga_delivery_exts, cmake_fragment
#
#     See the previous registry.yaml for full descriptions; semantics are
#     unchanged. These fields configure how the *host driver* is compiled
#     against the platform's SDK and are independent of bitstream building.
#
# Build-pipeline fields (NEW shape — replaces the old `remote_build:` block)
# -------------------------------------------------------------------------
#   bitbuilder        str        Id of an entry in the top-level `bitbuilders:`
#                                catalog. Selects the build recipe class +
#                                args_schema + params_schema.
#
#   bitbuilder_params dict       Per-platform parameters consumed by the
#                                bitbuilder's params_schema. Validated by the
#                                referenced pydantic class. Example: Alveo
#                                bitbuilders take `{board_name: au250}`. F2
#                                takes `{}`.
#
#   local_platform_path           str  Local path to the platform HDK. Resolved
#                                      with `${PLATFORMS_ROOT}` substitution.
#   local_build_script            str  Local path to build-bitstream.sh. Same
#                                      substitution rules.
#   local_project_staging_subdir  str  Project-relative path containing
#                                      `{quintuplet}` placeholder. The cmake
#                                      stage outputs each per-build into this
#                                      directory.
#   local_results_subdir          str  Project-relative directory where
#                                      reverse-rsynced build artifacts land.
#
#   host_models       dict       Keys are host_model ids the platform supports
#                                (currently `external`, `ec2_launch`). Values
#                                are per-host-model default dicts merged into
#                                the user's `target.build.host` AND
#                                `target.run.host` blocks at parse time. Same
#                                set governs both pipelines. Empty default
#                                dicts are valid.
#
#   publish           dict       Keys are publish.type ids the platform
#                                supports (currently `none`, `local_tarball`,
#                                `aws_afi`). Values are per-type default dicts
#                                merged into the user's `target.build.publish`
#                                block at parse time. The `none` entry should
#                                always be present (empty dict).
#
# Run-pipeline fields
# -------------------
#   runner                str    Id of an entry in the top-level `runners:`
#                                catalog. None => this platform does not
#                                support `fslab sim fpga`.
#
#   run_artifact_sources  dict   Keys are artifact_source.type ids the
#                                platform supports for `target.run.artifact_source`
#                                (currently `aws_afi`). Values are per-type
#                                default dicts merged into the user's
#                                `target.run.artifact_source` block at
#                                parse time.
#
# Layered defaults
# ----------------
# For host, publish, and run-side artifact_source blocks, the user's value
# (in fslab.yaml) is merged with the platform's default at parse-time:
#   1. Framework registry default     (e.g. ami_id: ami-xxxxxxxx)
#   2. Custom registry override       (e.g. team-shared HDK path)
#   3. User fslab.yaml override       (final value)
# Pydantic schema validates the merged result. Required fields with no default
# in any layer must be supplied by the user or parsing fails.
# ==============================================================================

platforms:

  # ----------------------------------------------------------------------------
  # f2  —  AWS FPGA F2 (FireSim native platform)
  # ----------------------------------------------------------------------------
  - id: f2
    label: "AWS F2 FPGA"

    # --- driver-side cmake fields -------------------------------
    config_package: "firesim.midasexamples"
    config_class: "DefaultF2Config"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs:
      - "${PLATFORMS_ROOT}/f2/aws-fpga-firesim-f2/sdk/userspace/include"
    extra_link_dirs:
      - "${PLATFORMS_ROOT}/f2/aws-fpga-firesim-f2/sdk/userspace/lib"
    extra_libs:
      - fpga_mgmt
      - z
    extra_link_options: []
    board_dir: "${PLATFORMS_ROOT}/f2/aws-fpga-firesim-f2/hdk/cl/developer_designs"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

    # --- build pipeline ----------------------------------------
    bitbuilder: f2
    bitbuilder_params: {}            # F2BitbuilderParams has no fields today

    local_platform_path:           "${PLATFORMS_ROOT}/f2/aws-fpga-firesim-f2"
    local_build_script:            "${PLATFORMS_ROOT}/f2/build-bitstream.sh"
    local_project_staging_subdir:  "build/fpga/cl_{quintuplet}"
    local_results_subdir:          "build/fpga/results-build"

    host_models:
      external: {}                  # user supplies host/user/ssh_key/remote_platform_path
      ec2_launch:
        # Framework-vetted defaults. The user can override any of these in
        # fslab.yaml. ami_id is intentionally omitted — there is no vetted
        # base AMI shipped today; the user must supply one (or set
        # `instance_id:` in fslab.yaml to opt into managed-reuse mode and
        # skip the launch path entirely).
        # m4.2xlarge - small design builds, setup testing (generally slower)
        # z1d.2xlarge - for bigger design builds, (8 cpu, 64gb RAM)
        # f2.6xlarge - for fpga simulation. (24 vcpu, 256gb ram), 1 FPGA slot. 
        instance_type:        "z1d.2xlarge"  
        aws_fpga_version:     "v0.1-firesim-lab"
        remote_platform_path: "/home/ubuntu/src/project_data/aws-fpga-firesim-f2"

    publish:
      none: {}
      aws_afi:
        append_userid_region: true   # firesim-style: bucket-<userid>-<region>
        copy_to_regions: []          # opt-in: list of regions to replicate the AFI to

    # --- run pipeline ----------------------------------------
    runner: f2
    run_artifact_sources:
      aws_afi: {}                    # user supplies agfi: in fslab.yaml

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u250  —  driver-side cmake retained; bitbuilder NOT YET WIRED.
  # ----------------------------------------------------------------------------
  # NOTE: `bitbuilder`, `bitbuilder_params`, `host_models`, `publish` are
  # intentionally omitted. Picking this platform for `fslab build fpga` will
  # raise a "platform has no bitbuilder configured" validation error. Driver
  # compilation (cmake) and metasimulation work as before.
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u250
    label: "Xilinx Alveo U250"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    board_dir: "${PLATFORMS_ROOT}/xilinx_alveo_u250"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""
    # bitbuilder: TODO — implement xilinx_alveo bitbuilder, then add:
    #   bitbuilder: xilinx_alveo
    #   bitbuilder_params: { board_name: au250 }
    #   local_platform_path: ...
    #   local_build_script: ...
    #   local_project_staging_subdir: "build/fpga/cl_{quintuplet}"
    #   local_results_subdir: "build/fpga/results-build"
    #   host_models: { external: {} }
    #   publish: { none: {}, local_tarball: {} }

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u280 — bitbuilder NOT YET WIRED (see u250 note).
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u280
    label: "Xilinx Alveo U280"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    board_dir: "${PLATFORMS_ROOT}/xilinx_alveo_u280"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u200 — bitbuilder NOT YET WIRED.
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u200
    label: "Xilinx Alveo U200"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    board_dir: "${PLATFORMS_ROOT}/xilinx_alveo_u200"
    fpga_delivery_exts: [".sv", ".defines.vh", ".synthesis.xdc", ".implementation.xdc"]
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_vcu118 — bitbuilder NOT YET WIRED.
  # ----------------------------------------------------------------------------
  - id: xilinx_vcu118
    label: "Xilinx VCU118"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
