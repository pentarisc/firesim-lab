fpgasimulators:

  # ----------------------------------------------------------------------------
  # XSIM  —  Xilinx FPGA-level simulation (uses XSIM for DUT-side execution)
  # Source makefile: xsim.mk
  #
  # XSIM has two distinct phases:
  #   1. xsim (compile) — compiles the host driver with MAIN=f2_xsim PLATFORM=f2
  #   2. xsim-dut (run) — invokes the Xilinx XSIM RTL simulation on the FPGA
  #
  # The xsim driver is compiled with MAIN=f2_xsim and PLATFORM=f2 regardless
  # of the broader project platform.  This is expressed through the `main` and
  # `platform_override` fields, which are written into FPGASIM_MAIN and
  # FPGASIM_PLATFORM in the generated Makefile.xsim.sim.
  #
  # The xsim-dut target depends on `replace-rtl` and `$(fpga_work_dir)/stamp`.
  # These are FPGA-board-specific targets that depend on Vivado synthesis
  # completing first.  They are expressed in the makefile_fragment rather than
  # structured fields because they involve external Makefile dependencies
  # (verif_dir, fpga_work_dir) that are not yet part of the fslab schema.
  # These will be promoted to structured fields when `fslab build fpga` is added.
  #
  # NOTE: rpath_origin is false for XSIM — the original xsim.mk does not set
  # -Wl,-rpath=$ORIGIN (the driver runs inside the FPGA simulation harness,
  # not on a standalone run-host where shared libs need co-location).
  # ----------------------------------------------------------------------------
  - id: xsim
    label: "Xilinx XSIM FPGA-Level Simulator"

    main: "f2_xsim"                    # MAIN= arg for simif_dir sub-make
    platform_override: "f2"            # PLATFORM= override

    rpath_origin: false
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []

    cmake_targets:
      - name: xsim
        comment: "[fslab] Compiling XSIM host driver"
      - name: xsim-dut
        comment: "[fslab] Running XSIM DUT on FPGA board"

    cmake_fragment: ""

    # xsim (driver compile) invokes simif_dir sub-make with MAIN=f2_xsim.
    # xsim-dut runs the Xilinx RTL simulation after FPGA synthesis.
    #
    # Variables used here that must be defined in the calling environment
    # or in a parent Makefile before including this fragment:
    #   fpga_work_dir  — path to the Vivado project work directory
    #   verif_dir      — path to the verification scripts directory
    #   replace-rtl    — phony target that programs the FPGA with fresh RTL
    #                    (defined by the parent FPGA build Makefile)
    makefile_fragment: |
      xsim_drv := $(OUT_DIR)/$(DESIGN)-$(FPGASIM_PLATFORM)

      $(xsim_drv): export LDFLAGS := $(LDFLAGS)
      $(xsim_drv): $(header) $(DRIVER_CC) $(DRIVER_H) $(midas_cc) $(midas_h)
      	$(MAKE) -C $(simif_dir) driver \
      		MAIN=$(FPGASIM_MAIN) \
      		PLATFORM=$(FPGASIM_PLATFORM) \
      		DRIVER_NAME=$(DESIGN) \
      		GEN_FILE_BASENAME=$(BASE_FILE_NAME) \
      		GEN_DIR=$(GEN_DIR) \
      		OUT_DIR=$(OUT_DIR) \
      		DRIVER=" $(DRIVER_CC) "

      .PHONY: xsim xsim-dut
      xsim: $(xsim_drv)

      xsim-dut: replace-rtl $(fpga_work_dir)/stamp
      	cd $(verif_dir)/scripts && $(MAKE) C_TEST=test_firesim

  # --- TEMPLATE: copy when registering a new fpgasim tool -------------------
