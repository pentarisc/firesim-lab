# =============================================================================
#  firesim-lab/targets/common/registry.yaml
#
#  Central registry of available bridges and platform features.
#  init-target reads this to discover options, validate CLI input, and
#  drive code generation.
#
#  To add a new bridge: append a block following the same schema.
# =============================================================================

bridges:

  - id: uart
    label: UART Bridge
    description: >
      Connects the target's UART TX/RX pins to the host via a token channel.
      Host driver writes received bytes to a file or stdout.
    origin: fslab
    input_ports:
      - "rxd"
    output_ports:
      - "txd"
    cpp_type: "uart_t"
    cpp_headers: ["bridges/uart.h"]
    cpp_sources: ["bridges/uart.cc"]
    runtime_plusargs:
#      - flag: "+uart-loopback"
#        description: "Echo TX bytes back to RX"
    required_params: [freq_mhz, baud_rate]
    cpp_template: "bridges/uart/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/uart/dut_imports.scala.j2"
      top_imports: "bridges/uart/top_imports.scala.j2"
      ports:       "bridges/uart/ports.scala.j2"
      wiring:      "bridges/uart/wiring.scala.j2"

  - id: fased
    label: FASED Memory Timing Model
    description: >
      Attaches a target AXI4 port to the FASED DRAM timing model.
      The C++ driver is built into firesim-lib automatically; this entry
      adds makefrag documentation and the GoldenGate symlink hook only.
    origin: firesim
    input_ports:
      # AXI4 write address (aw)
      - "s_aw_ready"
      # AXI4 write data (w)
      - "s_w_ready"
      # AXI4 write response (b)
      - "s_b_valid"
      - "s_b_id"
      - "s_b_resp"
      - "s_b_user"
      # AXI4 read address (ar)
      - "s_ar_ready"
      # AXI4 read data (r)
      - "s_r_valid"
      - "s_r_id"
      - "s_r_data"
      - "s_r_resp"
      - "s_r_last"
      - "s_r_user"
    output_ports:
      # AXI4 write address (aw)
      - "m_aw_valid"
      - "m_aw_id"
      - "m_aw_addr"
      - "m_aw_len"
      - "m_aw_size"
      - "m_aw_burst"
      - "m_aw_lock"
      - "m_aw_cache"
      - "m_aw_prot"
      - "m_aw_qos"
      - "m_aw_user"
      - "m_aw_region"
      # AXI4 write data (w)
      - "m_w_valid"
      - "m_w_data"
      - "m_w_strb"
      - "m_w_last"
      - "m_w_user"
      # AXI4 write response (b)
      - "m_b_ready"
      # AXI4 read address (ar)
      - "m_ar_valid"
      - "m_ar_id"
      - "m_ar_addr"
      - "m_ar_len"
      - "m_ar_size"
      - "m_ar_burst"
      - "m_ar_lock"
      - "m_ar_cache"
      - "m_ar_prot"
      - "m_ar_qos"
      - "m_ar_user"
      - "m_ar_region"
      # AXI4 read data (r)
      - "m_r_ready"
    cpp_type: "FASEDMemoryTimingModel"
    cpp_headers: ["bridges/fased_memory_timing_model.h"]
    cpp_sources: ["bridges/fased_memory_timing_model.cc"]
    runtime_plusargs:
      - flag: "+mm-unified-latency=<cycles>"
        description: "Simple unified read/write latency model"
      - flag: "+dramsim"
        description: "Enable DRAMSim2 timing model"
      - flag: "+fased-init-depth=<n>"
        description: "Initial DRAM row-buffer fill depth"
    required_params:
      - addr_bits
      - data_bits
      - id_bits
      - user_bits
      - memory_region_name
      - mem_base
      - mem_size
    cpp_template: "bridges/uart/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/fased/dut_imports.scala.j2"
      top_imports: "bridges/fased/top_imports.scala.j2"
      ports:       "bridges/fased/ports.scala.j2"
      wiring:      "bridges/fased/wiring.scala.j2"

  - id: iceblk
    label: BlockDevice Bridge
    description: >
      BlockDevBridge — Provides access to a virtual disk served from the host.
    origin: fslab
    input_ports:
      # Request Channel
      - "bdev_req_ready"
      # Write Data Channel
      - "bdev_data_ready"
      # Response Channel
      - "bdev_resp_valid"
      - "bdev_resp_bits_data"
      - "bdev_resp_bits_tag"
      # Info Channel
      - "bdev_info_nsectors"
      - "bdev_info_max_req_len"
    output_ports:
      # Request Channel
      - "bdev_req_valid"
      - "bdev_req_bits_write"
      - "bdev_req_bits_offset"
      - "bdev_req_bits_len"
      - "bdev_req_bits_tag"
      # Write Data Channel
      - "bdev_data_valid"
      - "bdev_data_bits_data"
      - "bdev_data_bits_tag"
      # Response Channel
      - "bdev_resp_ready"

    cpp_type: "blockdev_t"
    cpp_headers: ["bridges/blockdev.h"]
    cpp_sources: ["bridges/blockdev.cc"]
    runtime_plusargs:
    required_params: [tag_bits, n_trackers]
    cpp_template: "bridges/iceblk/sim_loop.cc.j2"
    scala_templates:
      #dut_imports: "bridges/uart/dut_imports.scala.j2"
      top_imports: "bridges/iceblk/top_imports.scala.j2"
      ports:       "bridges/iceblk/ports.scala.j2"
      wiring:      "bridges/iceblk/wiring.scala.j2"

# ---------------------------------------------------------------------------
# Features — non-bridge build-time scaffolding options
# ---------------------------------------------------------------------------
features:

  - id: verilog-blackbox
    label: Verilog BlackBox DUT
    description: >
      Generate a Chisel BlackBox wrapper and a stub Verilog module sized to
      match the selected bridges (AXI4 for FASED, UART pins, etc.)
    requires_bridge: []

  - id: multi-clock
    label: Multi-clock target
    description: >
      Adds a RationalClockBridge and generates a multi-clock TargetTop
      scaffold exposing separate clock domains to the DUT.
    requires_bridge: []

  - id: printf-synthesis
    label: Printf synthesis
    description: >
      Enables GoldenGate printf synthesis pass so target Chisel printf()
      calls are bridged to the host at simulation time.
    requires_bridge: []

# ==============================================================================
# platforms section
# ==============================================================================
# Schema reference
# ----------------
# Each entry under `platforms:` is keyed by the platform ID (matches the value
# a user selects with `fslab new --platform <id>`).
#
# Structured fields (validated by CLI, resolved before Jinja2 rendering)
# -----------------------------------------------------------------------
#   rpath_origin        bool       Emit -Wl,-rpath,$ORIGIN on the driver binary.
#                                  Set true whenever shared libs are co-located
#                                  with the driver on the run-host.
#
#   required_env_vars   list[str]  Environment variables that MUST be set when
#                                  `cmake` is run. The CLI emits a FATAL_ERROR
#                                  guard for each one (Decision 3a — $ENV{} is
#                                  emitted verbatim; CMake resolves at
#                                  configure-time, NOT at fslab-generate time).
#                                  Use this for values that are genuinely
#                                  runtime (EDA license servers, XRT paths…).
#
#   extra_cxx_flags     list[str]  Platform-specific compile flags appended
#                                  after DRIVER_CXXOPTS.
#
#   extra_include_dirs  list[str]  Passed to target_include_directories PRIVATE.
#                                  Supports both ${CMAKE_VAR} and $ENV{VAR}.
#
#   extra_link_dirs     list[str]  Passed to target_link_directories PRIVATE.
#                                  Supports both ${CMAKE_VAR} and $ENV{VAR}.
#
#   extra_libs          list[str]  Passed to target_link_libraries PRIVATE.
#                                  Names only — no -l prefix.
#
#   extra_link_options  list[str]  Passed to target_link_options PRIVATE.
#                                  Raw linker flags (-Wl,... etc.).
#
#   cmake_fragment      str        Verbatim CMake injected at the end of
#                                  section 4b, AFTER all structured fields.
#                                  This is the escape hatch: use it for any
#                                  CMake construct the structured fields cannot
#                                  express (find_package, execute_process, …).
#                                  When a pattern from cmake_fragment recurs
#                                  across 2+ platforms, promote it to a
#                                  structured field in the next CLI release.
#                                  Leave empty ("") if not needed.
#
# Environment variable convention (Decision 3a)
# ---------------------------------------------
# Use $ENV{VAR} syntax inside path strings. The CLI emits them verbatim into
# the rendered CMakeLists.txt; CMake resolves them at configure-time.
# This is intentional — it preserves runtime flexibility for values that must
# not be baked in at generation time (license servers, SDK roots set by
# setup scripts, etc.).
#
# CMake cache variables set in section 1 of the template (${PLATFORMS_DIR},
# ${MIDAS_DIR}, etc.) can also be referenced directly in path strings.
# ==============================================================================

platforms:

  # ----------------------------------------------------------------------------
  # f2  —  AWS FPGA F2 (FireSim native platform)
  # Mirrors: $(f2): export CXXFLAGS / LDFLAGS block in driver.mk
  # ----------------------------------------------------------------------------
  - id: f2
    label: "AWS F2 FPGA"
    config_package: "firesim.midasexamples"
    config_class: "DefaultF2Config"
    rpath_origin: true
    required_env_vars: []          # PLATFORMS_DIR is a CMake cache var — no env needed
    extra_cxx_flags: []
    extra_include_dirs:
      - "${PLATFORMS_DIR}/f2/aws-fpga-firesim-f2/sdk/userspace/include"
    extra_link_dirs:
      - "${PLATFORMS_DIR}/f2/aws-fpga-firesim-f2/sdk/userspace/lib"
    extra_libs:
      - fpga_mgmt
      - z
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u250  —  Conda-only build, no extra SDK paths
  # Mirrors: built_within_conda_only_driver_compilation_rules(xilinx_alveo_u250)
  #
  # NOTE: If your Docker image provides an XRT installation for Alveo, add its
  # paths via extra_include_dirs / extra_link_dirs / extra_libs, or use
  # cmake_fragment for a find_package(XRT) call. The driver.mk conda-only
  # rules assume conda supplies XRT implicitly — in a Docker workflow those
  # paths must be made explicit here.
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u250
    label: "Xilinx Alveo U250"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u280
  # Mirrors: built_within_conda_only_driver_compilation_rules(xilinx_alveo_u280)
  # See note on xilinx_alveo_u250 above.
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u280
    label: "Xilinx Alveo U280"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_alveo_u200
  # Mirrors: built_within_conda_only_driver_compilation_rules(xilinx_alveo_u200)
  # See note on xilinx_alveo_u250 above.
  # ----------------------------------------------------------------------------
  - id: xilinx_alveo_u200
    label: "Xilinx Alveo U200"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # xilinx_vcu118
  # Mirrors: built_within_conda_only_driver_compilation_rules(xilinx_vcu118)
  # See note on xilinx_alveo_u250 above.
  # ----------------------------------------------------------------------------
  - id: xilinx_vcu118
    label: "Xilinx VCU118"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # rhsresearch_nitefury_ii
  # Mirrors: built_within_conda_only_driver_compilation_rules(rhsresearch_nitefury_ii)
  # See note on xilinx_alveo_u250 above.
  # ----------------------------------------------------------------------------
  - id: rhsresearch_nitefury_ii
    label: "RHS Research Nitefury II"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # vitis  —  Xilinx Vitis / XRT (experimental, Ubuntu 20.04 / 18.04)
  # Mirrors: $(vitis): export CXXFLAGS / LDFLAGS block in driver.mk
  #
  # Decision 3a rationale: XILINX_XRT is sourced by the XRT setup script
  # (e.g. /opt/xilinx/xrt/setup.sh) and is legitimately a runtime value —
  # different Docker images or XRT versions may install to different prefixes.
  # It is therefore emitted as $ENV{XILINX_XRT} so CMake resolves it at
  # configure-time rather than baking a path at fslab-generate time.
  #
  # CONDA_PREFIX references from the original driver.mk are intentionally
  # omitted — fslab runs in Docker without conda. If your image installs
  # additional headers under a non-standard prefix, add them here or in
  # cmake_fragment.
  #
  # -ldl is required on Ubuntu 20.04 (backwards-compatible with 18.04).
  # ----------------------------------------------------------------------------
  - id: vitis
    label: "Vitis"
    config_package: "firesim.midasexamples"
    config_class: "ChangeThis"
    rpath_origin: true
    required_env_vars:
      - XILINX_XRT          # sourced by /opt/xilinx/xrt/setup.sh (or equivalent)
    extra_cxx_flags: []
    extra_include_dirs:
      - "$ENV{XILINX_XRT}/include"
      - "/usr/include"                   # system fallback (-idirafter semantics)
    extra_link_dirs:
      - "/usr/lib/x86_64-linux-gnu"
      - "$ENV{XILINX_XRT}/lib"
    extra_libs:
      - uuid
      - xrt_coreutil
      - dl                               # required on Ubuntu 20.04
      - z
    extra_link_options:
      # Needed so the linker can resolve indirect deps against system libs
      # without adding them to the binary's DT_NEEDED.
      - "-Wl,-rpath-link,/usr/lib/x86_64-linux-gnu"
    cmake_fragment: ""

  # ----------------------------------------------------------------------------
  # TEMPLATE: copy this block when registering a new platform.
  # Replace <platform_id> with your platform name, fill in the fields, and
  # leave cmake_fragment empty unless structured fields are insufficient.
  # ----------------------------------------------------------------------------
  # <platform_id>:
  #   rpath_origin: false
  #   required_env_vars: []
  #   extra_cxx_flags: []
  #   extra_include_dirs: []
  #   extra_link_dirs: []
  #   extra_libs: []
  #   extra_link_options: []
  #   cmake_fragment: ""
  #
  # cmake_fragment example — using find_package (not expressible as structured fields):
  #
  #   cmake_fragment: |
  #     find_package(SomeSDK REQUIRED COMPONENTS Core)
  #     target_link_libraries(${DRIVER_TARGET} PRIVATE SomeSDK::Core)
  #     message(STATUS "[fslab] SomeSDK version: ${SomeSDK_VERSION}")

# ==============================================================================
# metasimulators and fpgasimulators sections
# ==============================================================================
#
# Schema quick-reference
# ----------------------
# PATH SYNTAX: extra_include_dirs and extra_link_dirs in metasimulators /
#              fpgasimulators use MAKEFILE-style references:
#                $(VAR)   — Make expands from environment at build-time
#                ${VAR}   — Make brace form (equivalent to $(VAR))
#                /path    — absolute path
#              Do NOT use cmake's $ENV{VAR} here — Make does not understand it.
#
# RPATH: rpath_origin: true emits -Wl,-rpath='$$$$ORIGIN' in Makefile.sim
#        (four $ signs survive two rounds of Make expansion to give $ORIGIN).
#
# extra_link_options: placed BEFORE the library list in LDFLAGS, so
#        -Wl,--no-as-needed (VCS/Xcelium) correctly affects all libraries.
#
# makefile_fragment: verbatim Makefile content appended to Makefile.<id>.sim.
#        Use this for Makefrag include directives and target aliases.
#        Must NOT contain Jinja2 markers ({{ }} {% %} {# #}).
#
# cmake_targets: declares which cmake targets to expose.
#        cmake target name = "metasim-<n>" or "fpgasim-<n>".
#        make_target = name of the make target inside Makefile.<id>.sim
#                      (defaults to .name when omitted).
# ==============================================================================

metasimulators:

  # ----------------------------------------------------------------------------
  # Verilator  —  MIDAS-level software simulation
  # Source makefiles: verilator.mk
  # ----------------------------------------------------------------------------
  - id: verilator
    label: "Verilator MIDAS-Level Simulator"

    tool_cxxopts: ["-O2"]              # VERILATOR_CXXOPTS ?= -O2
    make_flags: ["-j8", "VM_PARALLEL_BUILDS=1"]  # VERILATOR_MAKEFLAGS ?= -j8 VM_PARALLEL_BUILDS=1
    rtlsim_define: true
    rpath_origin: true

    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []             # Verilator uses no tool-specific includes
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []

    cmake_targets:
      - name: verilator
        comment: "[fslab] Building Verilator simulation (standard)"
      - name: verilator-debug
        comment: "[fslab] Building Verilator simulation (debug)"

    cmake_fragment: ""

    # Makefrag include + target aliases.
    # sim_harness is set to a no-op rule (": ;") so Make does not try to build
    # simif_emul_all.cc from scratch — it is already handled by the Makefrag.
    makefile_fragment: |
      include $(midas_dir)/rtlsim/Makefrag-verilator
      $(sim_harness): ;
      verilator: $(OUT_DIR)/V$(DRIVER_NAME)
      verilator-debug: $(OUT_DIR)/V$(DRIVER_NAME)-debug

  # ----------------------------------------------------------------------------
  # VCS  —  MIDAS-level software simulation
  # Source makefile: vcs.mk
  #
  # -Wl,--no-as-needed is required because VCS can reorder object files and
  # libraries at link time in ways that prune valid dependencies when
  # --as-needed is active. It MUST be placed before the library list in
  # LDFLAGS, which is why it goes in extra_link_options (prepended by template).
  #
  # VCS_HOME is required for the tool include directory.
  # VCS_HOME must be set in the environment before running cmake.
  # ----------------------------------------------------------------------------
  - id: vcs
    label: "VCS MIDAS-Level Simulator"

    tool_cxxopts: ["-O2"]              # VCS_CXXOPTS ?= -O2
    make_flags: []
    rtlsim_define: true
    rpath_origin: true

    required_env_vars: [VCS_HOME]
    extra_cxx_flags: []
    extra_include_dirs:
      - "$(VCS_HOME)/include"          # -I$(VCS_HOME)/include added to CXXFLAGS
    extra_link_dirs: []
    extra_libs: []
    extra_link_options:
      - "-Wl,--no-as-needed"           # Must precede all libs — template places first

    cmake_targets:
      - name: vcs
        comment: "[fslab] Building VCS simulation (standard)"
      - name: vcs-debug
        comment: "[fslab] Building VCS simulation (debug)"
      - name: vcs-post-synth
        comment: "[fslab] Building VCS post-synthesis simulation"
      - name: vcs-post-synth-debug
        comment: "[fslab] Building VCS post-synthesis simulation (debug)"

    cmake_fragment: ""

    makefile_fragment: |
      include $(midas_dir)/rtlsim/Makefrag-vcs
      $(vcs_harness): ;
      vcs: $(OUT_DIR)/$(DRIVER_NAME)
      vcs-debug: $(OUT_DIR)/$(DRIVER_NAME)-debug
      vcs-post-synth: $(OUT_DIR)/$(DRIVER_NAME)-post-synth
      vcs-post-synth-debug: $(OUT_DIR)/$(DRIVER_NAME)-post-synth-debug

  # ----------------------------------------------------------------------------
  # Xcelium  —  MIDAS-level software simulation
  # Source makefile: xcelium.mk
  #
  # -Wl,--no-as-needed same concern as VCS — placed in extra_link_options.
  # XCELIUM_HOME required for tool include directory.
  # ----------------------------------------------------------------------------
  - id: xcelium
    label: "Xcelium MIDAS-Level Simulator"

    tool_cxxopts: ["-O2"]              # XCELIUM_CXXOPTS ?= -O2
    make_flags: []
    rtlsim_define: true
    rpath_origin: true

    required_env_vars: [XCELIUM_HOME]
    extra_cxx_flags: []
    extra_include_dirs:
      - "$(XCELIUM_HOME)/include"      # -I$(XCELIUM_HOME)/include added to CXXFLAGS
    extra_link_dirs: []
    extra_libs: []
    extra_link_options:
      - "-Wl,--no-as-needed"           # See note above; must precede libs

    cmake_targets:
      - name: xcelium
        comment: "[fslab] Building Xcelium simulation"

    cmake_fragment: ""

    makefile_fragment: |
      include $(midas_dir)/rtlsim/Makefrag-xcelium
      $(xcelium_harness): ;
      xcelium: $(xc_sim_name)

  # --- TEMPLATE: copy when registering a new metasim tool -------------------
  # - id: <tool_id>
  #   label: "<Human Readable Label>"
  #   tool_cxxopts: ["-O2"]
  #   make_flags: []
  #   rtlsim_define: true
  #   rpath_origin: true
  #   required_env_vars: []
  #   extra_cxx_flags: []
  #   extra_include_dirs: []
  #   extra_link_dirs: []
  #   extra_libs: []
  #   extra_link_options: []
  #   cmake_targets:
  #     - name: <tool_id>
  #       comment: "[fslab] Building <label>"
  #   cmake_fragment: ""
  #   makefile_fragment: |
  #     include $(midas_dir)/rtlsim/Makefrag-<tool>
  #     $(<tool>_harness): ;
  #     <tool_id>: $(<tool_output_var>)


fpgasimulators:

  # ----------------------------------------------------------------------------
  # XSIM  —  Xilinx FPGA-level simulation (uses XSIM for DUT-side execution)
  # Source makefile: xsim.mk
  #
  # XSIM has two distinct phases:
  #   1. xsim (compile) — compiles the host driver with MAIN=f2_xsim PLATFORM=f2
  #   2. xsim-dut (run) — invokes the Xilinx XSIM RTL simulation on the FPGA
  #
  # The xsim driver is compiled with MAIN=f2_xsim and PLATFORM=f2 regardless
  # of the broader project platform.  This is expressed through the `main` and
  # `platform_override` fields, which are written into FPGASIM_MAIN and
  # FPGASIM_PLATFORM in the generated Makefile.xsim.sim.
  #
  # The xsim-dut target depends on `replace-rtl` and `$(fpga_work_dir)/stamp`.
  # These are FPGA-board-specific targets that depend on Vivado synthesis
  # completing first.  They are expressed in the makefile_fragment rather than
  # structured fields because they involve external Makefile dependencies
  # (verif_dir, fpga_work_dir) that are not yet part of the fslab schema.
  # These will be promoted to structured fields when `fslab build fpga` is added.
  #
  # NOTE: rpath_origin is false for XSIM — the original xsim.mk does not set
  # -Wl,-rpath=$ORIGIN (the driver runs inside the FPGA simulation harness,
  # not on a standalone run-host where shared libs need co-location).
  # ----------------------------------------------------------------------------
  - id: xsim
    label: "Xilinx XSIM FPGA-Level Simulator"

    main: "f2_xsim"                    # MAIN= arg for simif_dir sub-make
    platform_override: "f2"            # PLATFORM= override

    rpath_origin: false
    required_env_vars: []
    extra_cxx_flags: []
    extra_include_dirs: []
    extra_link_dirs: []
    extra_libs: []
    extra_link_options: []

    cmake_targets:
      - name: xsim
        comment: "[fslab] Compiling XSIM host driver"
      - name: xsim-dut
        comment: "[fslab] Running XSIM DUT on FPGA board"

    cmake_fragment: ""

    # xsim (driver compile) invokes simif_dir sub-make with MAIN=f2_xsim.
    # xsim-dut runs the Xilinx RTL simulation after FPGA synthesis.
    #
    # Variables used here that must be defined in the calling environment
    # or in a parent Makefile before including this fragment:
    #   fpga_work_dir  — path to the Vivado project work directory
    #   verif_dir      — path to the verification scripts directory
    #   replace-rtl    — phony target that programs the FPGA with fresh RTL
    #                    (defined by the parent FPGA build Makefile)
    makefile_fragment: |
      xsim_drv := $(OUT_DIR)/$(DESIGN)-$(FPGASIM_PLATFORM)

      $(xsim_drv): export LDFLAGS := $(LDFLAGS)
      $(xsim_drv): $(header) $(DRIVER_CC) $(DRIVER_H) $(midas_cc) $(midas_h)
      	$(MAKE) -C $(simif_dir) driver \
      		MAIN=$(FPGASIM_MAIN) \
      		PLATFORM=$(FPGASIM_PLATFORM) \
      		DRIVER_NAME=$(DESIGN) \
      		GEN_FILE_BASENAME=$(BASE_FILE_NAME) \
      		GEN_DIR=$(GEN_DIR) \
      		OUT_DIR=$(OUT_DIR) \
      		DRIVER=" $(DRIVER_CC) "

      .PHONY: xsim xsim-dut
      xsim: $(xsim_drv)

      xsim-dut: replace-rtl $(fpga_work_dir)/stamp
      	cd $(verif_dir)/scripts && $(MAKE) C_TEST=test_firesim

